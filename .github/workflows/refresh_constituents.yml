name: Refresh SEBI Constituents

on:
  schedule:
    # Run at midnight UTC on the 1st and 15th of every month
    - cron: '0 0 1,15 * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  update-constituents:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Download CSVs
        env:
          PYTHONPATH: .
        run: python scripts/download_constituents.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/index_constituents/*.csv
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update index constituents"
            git push
          fi
